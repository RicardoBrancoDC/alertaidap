name: IDAP RSS Monitor

on:
  schedule:
    - cron: "*/30 * * * *"  # a cada 30 minutos (UTC)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run monitor
        env:
          RSS_URL: "https://idapfile.mdr.gov.br/idap/api/rss/cap"
          STATE_PATH: "state/seen.json"
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python3 idapcap/scripts/check_idap_rss.py

      - name: Commit state file
        run: |
          if [ -f state/seen.json ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add state/seen.json
            git commit -m "Update state" || echo "No changes to commit"
            git push
          else
            echo "state/seen.json not found, nothing to commit"
          fi
